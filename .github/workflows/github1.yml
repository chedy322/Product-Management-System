name: CI/Cd for Product Management System
on:
    push:
        branches: [feature/docker]
        paths-ignore: ["*.md"]
    pull_request:
        branches: [feature/docker]

env:
    JAVA_VERSION: 25

    # added concurrency so when we start new workflow we stop the previous one
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        strategy:
            matrix:
                os: [windows-latest,ubuntu-latest]
            fail-fast: false
        uses: ./.github/workflows/test-workflow.yml
        with:
            os: ${{matrix.os}}
            java: "25"


# build docker image
    Build-deploy-image:
        needs: test
        runs-on: "ubuntu-latest"
        if: github.event_name!='pull_request' && success()
        environment: Docker
        steps:
            -   name: Checkout code repository
                uses: actions/checkout@v4
            
            -   name: Login in to docker
                uses: docker/login-action@v3
                with:
                    username: ${{secrets.DOCKER_USERNAME}}
                    password: ${{secrets.DOCKER_PASSWORD}}
            
            -   name: Docker meta tags
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ${{secrets.DOCKER_USERNAME}}/my-springboot-app
            -   name: build and push to docker hub registry
                uses: docker/build-push-action@v5
                with:
                    context: .
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                
            
            






    
